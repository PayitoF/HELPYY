services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - ML_SERVICE_URL=http://ml-mock:8001
    depends_on:
      ml-mock:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data

  ml-mock:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    command: uvicorn backend.ml_client.mock_server:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/app-mockup/node_modules

  web-widget:
    image: node:20-slim
    working_dir: /app
    command: npx serve . -l 3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend/web-widget:/app
