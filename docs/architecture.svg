<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1650"/>
      <stop offset="100%" style="stop-color:#0727b5"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="337" x2="1200" y2="337" stroke="white" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="675" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- ── HEADER ── -->
  <text x="600" y="52" text-anchor="middle" font-size="32" font-weight="800" fill="white" letter-spacing="-0.5">Helpyy Hand</text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="#93b4ff" letter-spacing="3">PLATAFORMA DE IA CONVERSACIONAL · BBVA COLOMBIA</text>

  <!-- Divider -->
  <rect x="480" y="90" width="240" height="2" rx="1" fill="#0727b5" opacity="0.6"/>
  <rect x="540" y="90" width="120" height="2" rx="1" fill="#4d8bff"/>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- ROW 1: 3 main pillars -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- PILLAR 1: Web Widget -->
  <rect x="60" y="115" width="320" height="155" rx="16" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1" filter="url(#shadow)"/>
  <text x="220" y="155" text-anchor="middle" font-size="36">🌐</text>
  <text x="220" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="white">Web Pública BBVA</text>
  <text x="220" y="207" text-anchor="middle" font-size="12" fill="#93b4ff">Widget conversacional embebible</text>
  <text x="220" y="225" text-anchor="middle" font-size="12" fill="#93b4ff">Onboarding sin fricción</text>
  <text x="220" y="248" text-anchor="middle" font-size="11" fill="#4d8bff">Apertura de cuenta · Primer contacto</text>

  <!-- Arrow 1→center -->
  <path d="M 380 192 L 440 192" stroke="#4d8bff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- PILLAR 2: Helpyy Core (center) -->
  <rect x="440" y="100" width="320" height="185" rx="16" fill="#0727b5" stroke="#4d8bff" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="148" text-anchor="middle" font-size="40">🤝</text>
  <text x="600" y="180" text-anchor="middle" font-size="18" font-weight="800" fill="white">Helpyy Hand</text>
  <text x="600" y="202" text-anchor="middle" font-size="12" fill="#c8d8ff">Motor de IA Conversacional</text>
  <text x="600" y="222" text-anchor="middle" font-size="12" fill="#c8d8ff">5 Agentes Especializados</text>
  <text x="600" y="242" text-anchor="middle" font-size="12" fill="#c8d8ff">Orquestación Inteligente</text>
  <text x="600" y="268" text-anchor="middle" font-size="11" fill="#4d8bff">Bedrock Claude · AWS App Runner</text>

  <!-- Arrow center→3 -->
  <path d="M 760 192 L 820 192" stroke="#4d8bff" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- PILLAR 3: App Móvil -->
  <rect x="820" y="115" width="320" height="155" rx="16" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1" filter="url(#shadow)"/>
  <text x="980" y="155" text-anchor="middle" font-size="36">📱</text>
  <text x="980" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="white">App Bancaria</text>
  <text x="980" y="207" text-anchor="middle" font-size="12" fill="#93b4ff">Dashboard · Chat · Gamificación</text>
  <text x="980" y="225" text-anchor="middle" font-size="12" fill="#93b4ff">Solicitud de crédito · Misiones</text>
  <text x="980" y="248" text-anchor="middle" font-size="11" fill="#4d8bff">Clientes bancarizados · Helpyy activo</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- ROW 2: 5 Agents -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <text x="600" y="330" text-anchor="middle" font-size="12" fill="#93b4ff" letter-spacing="2">LOS 5 AGENTES</text>

  <!-- Agent cards -->
  <!-- Onboarding -->
  <rect x="60" y="345" width="190" height="110" rx="12" fill="url(#card)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="155" y="378" text-anchor="middle" font-size="28">🟢</text>
  <text x="155" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="white">Onboarding</text>
  <text x="155" y="420" text-anchor="middle" font-size="11" fill="#93b4ff">Bancarización</text>
  <text x="155" y="438" text-anchor="middle" font-size="11" fill="#93b4ff">Apertura de cuenta</text>

  <!-- Credit Evaluator -->
  <rect x="268" y="345" width="190" height="110" rx="12" fill="url(#card)" stroke="#2980b9" stroke-width="1.5"/>
  <text x="363" y="378" text-anchor="middle" font-size="28">🔵</text>
  <text x="363" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="white">Evaluador</text>
  <text x="363" y="420" text-anchor="middle" font-size="11" fill="#93b4ff">Scoring ML</text>
  <text x="363" y="438" text-anchor="middle" font-size="11" fill="#93b4ff">Crédito · Contrato</text>

  <!-- Financial Advisor -->
  <rect x="476" y="345" width="248" height="110" rx="12" fill="#0727b5" stroke="#4d8bff" stroke-width="2"/>
  <text x="600" y="378" text-anchor="middle" font-size="28">🟣</text>
  <text x="600" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="white">Asesor Financiero</text>
  <text x="600" y="420" text-anchor="middle" font-size="11" fill="#c8d8ff">Misiones · Gamificación</text>
  <text x="600" y="438" text-anchor="middle" font-size="11" fill="#c8d8ff">Plan personalizado</text>

  <!-- Monitor -->
  <rect x="742" y="345" width="190" height="110" rx="12" fill="url(#card)" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="837" y="378" text-anchor="middle" font-size="28">🔴</text>
  <text x="837" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="white">Monitor</text>
  <text x="837" y="420" text-anchor="middle" font-size="11" fill="#93b4ff">Seguimiento</text>
  <text x="837" y="438" text-anchor="middle" font-size="11" fill="#93b4ff">Notificaciones</text>

  <!-- General -->
  <rect x="950" y="345" width="190" height="110" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="1045" y="378" text-anchor="middle" font-size="28">⚪</text>
  <text x="1045" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="white">General</text>
  <text x="1045" y="420" text-anchor="middle" font-size="11" fill="#93b4ff">FAQ · Productos</text>
  <text x="1045" y="438" text-anchor="middle" font-size="11" fill="#93b4ff">Atención 24/7</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- ROW 3: Bottom pillars -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- ML Model -->
  <rect x="60" y="490" width="260" height="120" rx="14" fill="url(#card)" stroke="#27ae60" stroke-width="1.5"/>
  <text x="190" y="528" text-anchor="middle" font-size="30">🧮</text>
  <text x="190" y="555" text-anchor="middle" font-size="14" font-weight="700" fill="white">Modelo ML</text>
  <text x="190" y="575" text-anchor="middle" font-size="11" fill="#93b4ff">Scoring crediticio alternativo</text>
  <text x="190" y="593" text-anchor="middle" font-size="11" fill="#93b4ff">Señales no tradicionales</text>

  <!-- Security & Privacy -->
  <rect x="345" y="490" width="260" height="120" rx="14" fill="url(#card)" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="475" y="528" text-anchor="middle" font-size="30">🔒</text>
  <text x="475" y="555" text-anchor="middle" font-size="14" font-weight="700" fill="white">Privacidad</text>
  <text x="475" y="575" text-anchor="middle" font-size="11" fill="#93b4ff">PII Tokenizado</text>
  <text x="475" y="593" text-anchor="middle" font-size="11" fill="#93b4ff">Ley 1581 · Habeas Data</text>

  <!-- AWS Cloud -->
  <rect x="630" y="490" width="260" height="120" rx="14" fill="url(#card)" stroke="#f39c12" stroke-width="1.5"/>
  <text x="760" y="528" text-anchor="middle" font-size="30">☁️</text>
  <text x="760" y="555" text-anchor="middle" font-size="14" font-weight="700" fill="white">AWS Cloud</text>
  <text x="760" y="575" text-anchor="middle" font-size="11" fill="#93b4ff">App Runner · Lambda · Bedrock</text>
  <text x="760" y="593" text-anchor="middle" font-size="11" fill="#93b4ff">CloudFront · DynamoDB · WAF</text>

  <!-- RCP Badge -->
  <rect x="915" y="490" width="225" height="120" rx="14" fill="#0727b5" stroke="#4d8bff" stroke-width="2"/>
  <text x="1027" y="528" text-anchor="middle" font-size="30">🎯</text>
  <text x="1027" y="555" text-anchor="middle" font-size="14" font-weight="700" fill="white">RCP</text>
  <text x="1027" y="575" text-anchor="middle" font-size="11" fill="#c8d8ff">Cero fricción</text>
  <text x="1027" y="593" text-anchor="middle" font-size="11" fill="#c8d8ff">El banco va hacia ti</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="640" width="1200" height="35" fill="black" fill-opacity="0.3"/>
  <text x="600" y="662" text-anchor="middle" font-size="11" fill="#93b4ff" letter-spacing="1">
    BBVA Colombia · OutBox · 2026 · Inclusión financiera impulsada por IA
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4d8bff"/>
    </marker>
  </defs>

</svg>
