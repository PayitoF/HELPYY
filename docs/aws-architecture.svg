  <g transform="translate(850, 232)">
    <rect width="160" height="40" rx="6" fill="#004d40"/>
    <text x="80" y="16" text-anchor="middle" font-size="9" fill="white">Function URL (HTTPS)</text>
    <text x="80" y="30" text-anchor="middle" font-size="8" fill="#80cbc4">APPROVE / REVIEW / REJECT</text>
