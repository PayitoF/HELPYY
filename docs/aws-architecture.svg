  <!-- Arrow App Runner → Bedrock -->
  <path d="M 600,370 L 600,420" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <g transform="translate(510, 420)">
    <rect width="180" height="70" rx="10" fill="#1a237e" stroke="#4d9fff" stroke-width="1.5" filter="url(#shadow)"/>
