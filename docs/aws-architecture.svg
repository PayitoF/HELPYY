  <!-- EVENTBRIDGE + LAMBDA MONITOR -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="820" y="320" width="220" height="130" rx="10" fill="url(#groupBg)" stroke="#e74c3c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="930" y="338" text-anchor="middle" font-size="10" fill="#e74c3c" letter-spacing="1">MONITOR CRON</text>

  <!-- EventBridge -->
