    <text x="25" y="32" text-anchor="middle" font-size="24">🗄️</text>
    <text x="25" y="52" text-anchor="middle" font-size="8" fill="white">DynamoDB</text>
  </g>

  <!-- Tables list -->
  <g transform="translate(1080, 115)">
