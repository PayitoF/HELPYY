<svg viewBox="0 0 1300 820" xmlns="http://www.w3.org/2000/svg" font-family="'Amazon Ember', Arial, sans-serif">
  <defs>
    <!-- AWS Orange gradient -->
    <linearGradient id="awsBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <!-- Group backgrounds -->
    <linearGradient id="groupBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4d9fff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff9900"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7aa116"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(255,255,255,0.5)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="820" fill="url(#awsBg)"/>

  <!-- Title -->
  <text x="650" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="white">Helpyy Hand — Arquitectura AWS</text>
  <text x="650" y="60" text-anchor="middle" font-size="12" fill="#ff9900" letter-spacing="2">BBVA COLOMBIA · us-east-1</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- USERS (left) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <g transform="translate(30, 120)">
    <!-- User icon -->
    <circle cx="40" cy="30" r="18" fill="#4d9fff" opacity="0.2"/>
    <circle cx="40" cy="22" r="10" fill="#4d9fff"/>
    <path d="M20,55 Q40,42 60,55" fill="#4d9fff"/>
    <text x="40" y="75" text-anchor="middle" font-size="11" fill="white">Usuario</text>
    <text x="40" y="90" text-anchor="middle" font-size="10" fill="#93b4ff">Web / Móvil</text>
  </g>

  <!-- Arrow users → CloudFront -->
  <path d="M 130,165 L 185,165" stroke="#4d9fff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowBlue)"/>
  <text x="157" y="158" text-anchor="middle" font-size="9" fill="#4d9fff">HTTPS</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- CLOUDFRONT + WAF GROUP -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="185" y="90" width="220" height="160" rx="10" fill="url(#groupBg)" stroke="#8c4fff" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="295" y="108" text-anchor="middle" font-size="10" fill="#8c4fff" letter-spacing="1">EDGE</text>

  <!-- WAF icon -->
  <g transform="translate(200, 115)">
    <rect width="44" height="44" rx="8" fill="#dd344c"/>
    <text x="22" y="28" text-anchor="middle" font-size="20">🛡️</text>
    <text x="22" y="52" text-anchor="middle" font-size="9" fill="white">WAF</text>
    <text x="22" y="64" text-anchor="middle" font-size="8" fill="#ffb3bc">AWS WAFv2</text>
  </g>

  <!-- CloudFront icon -->
  <g transform="translate(270, 115)">
    <rect width="44" height="44" rx="8" fill="#8c4fff"/>
    <text x="22" y="28" text-anchor="middle" font-size="20">🌐</text>
    <text x="22" y="52" text-anchor="middle" font-size="9" fill="white">CloudFront</text>
    <text x="22" y="64" text-anchor="middle" font-size="8" fill="#d4b3ff">CDN Global</text>
  </g>

  <!-- S3 App -->
  <g transform="translate(200, 195)">
    <rect width="44" height="44" rx="8" fill="#3f8624"/>
    <text x="22" y="28" text-anchor="middle" font-size="20">🪣</text>
    <text x="22" y="52" text-anchor="middle" font-size="9" fill="white">S3 App</text>
    <text x="22" y="64" text-anchor="middle" font-size="8" fill="#b3ffb3">React Build</text>
  </g>

  <!-- S3 Widget -->
  <g transform="translate(270, 195)">
    <rect width="44" height="44" rx="8" fill="#3f8624"/>
    <text x="22" y="28" text-anchor="middle" font-size="20">🪣</text>
    <text x="22" y="52" text-anchor="middle" font-size="9" fill="white">S3 Widget</text>
    <text x="22" y="64" text-anchor="middle" font-size="8" fill="#b3ffb3">Web Widget</text>
  </g>

  <!-- Arrow CloudFront → App Runner -->
  <path d="M 405,165 L 460,165" stroke="#ff9900" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="432" y="158" text-anchor="middle" font-size="9" fill="#ff9900">REST/WS</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- APP RUNNER GROUP -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="460" y="80" width="280" height="290" rx="10" fill="url(#groupBg)" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="600" y="98" text-anchor="middle" font-size="10" fill="#ff9900" letter-spacing="1">AWS APP RUNNER · FastAPI</text>

  <!-- App Runner icon -->
  <g transform="translate(530, 108)">
    <rect width="140" height="50" rx="8" fill="#ff9900"/>
    <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">🚀 App Runner</text>
    <text x="70" y="38" text-anchor="middle" font-size="9" fill="white">helpyy-dev-api · 1vCPU 2GB</text>
