  <text x="650" y="660" text-anchor="middle" font-size="11" fill="#ff9900" letter-spacing="1">REGIÓN: us-east-1 · CUENTA: 622247620363 · BBVA Colombia · OutBox 2026</text>
  <text x="650" y="682" text-anchor="middle" font-size="10" fill="#93b4ff">
    App Runner (helpyy-dev-api) · Lambda ML (helpyy-dev-ml-scoring) · Lambda Monitor (helpyy-dev-monitor) · DynamoDB (5 tablas) · CloudFront (2 distribuciones)
