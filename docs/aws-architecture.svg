  <g transform="translate(475, 218)">
    <rect width="60" height="50" rx="6" fill="#1b5e20"/>
    <text x="30" y="22" text-anchor="middle" font-size="16">🟢</text>
    <text x="30" y="40" text-anchor="middle" font-size="8" fill="white">Onboard</text>
  </g>
  <g transform="translate(543, 218)">
    <rect width="60" height="50" rx="6" fill="#0d47a1"/>
    <text x="30" y="22" text-anchor="middle" font-size="16">🔵</text>
    <text x="30" y="40" text-anchor="middle" font-size="8" fill="white">Evaluador</text>
  </g>
  <g transform="translate(611, 218)">
