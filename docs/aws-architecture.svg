    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#93b4ff">helpyy-dev-models-622247620363</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#93b4ff">model.tar.gz · Artifacts</text>
