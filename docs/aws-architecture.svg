  <text x="930" y="488" text-anchor="middle" font-size="10" fill="#ff9900" letter-spacing="1">OBSERVABILIDAD</text>

  <g transform="translate(835, 498)">
    <rect width="85" height="50" rx="8" fill="#e65100"/>
    <text x="42" y="22" text-anchor="middle" font-size="16">📢</text>
    <text x="42" y="40" text-anchor="middle" font-size="9" fill="white">SNS Alerts</text>
  </g>

  <g transform="translate(940, 498)">
    <rect width="85" height="50" rx="8" fill="#1565c0"/>
    <text x="42" y="22" text-anchor="middle" font-size="16">📊</text>
    <text x="42" y="40" text-anchor="middle" font-size="9" fill="white">CloudWatch</text>
  </g>

