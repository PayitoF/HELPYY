    <text x="87" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#4d9fff">Tablas</text>
    <text x="15" y="40" font-size="10" fill="#93b4ff">• helpyy-dev-users</text>
    <text x="15" y="58" font-size="10" fill="#93b4ff">• helpyy-dev-sessions</text>
    <text x="15" y="76" font-size="10" fill="#93b4ff">• helpyy-dev-notifications</text>
    <text x="15" y="94" font-size="10" fill="#93b4ff">• helpyy-dev-pii-vault</text>
    <text x="15" y="112" font-size="10" fill="#93b4ff">• helpyy-dev-missions</text>
