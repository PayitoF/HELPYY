# Full local stack with Ollama included
version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      - ollama
      - ml-mock
    volumes:
      - ../../backend:/app/backend

  ml-mock:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: uvicorn backend.ml_client.mock_server:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    volumes:
      - ../../backend:/app/backend

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
