name: CI/CD — Helpyy Hand

# ══════════════════════════════════════════════════════════════
# Flujo: dev → PR a qa (tests) → PR a main (tests) → merge = deploy
# ══════════════════════════════════════════════════════════════

on:
  pull_request:
    branches: [qa, main]
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

permissions:
  id-token: write
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════
  # Tests — runs on every PR to qa or main
  # ════════════════════════════════════════════════════════════
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest-timeout pytest-asyncio

      - name: Run unit + contract tests
        run: |
          python -m pytest tests/unit/ tests/contract/ \
            -x --tb=short -q --timeout=30 \
            --ignore=tests/unit/test_onboarding_agent.py \
            --ignore=tests/unit/test_orchestrator.py

      - name: Lint
        run: |
          pip install ruff
          ruff check backend/ tests/ --select E,F,W --ignore E402 --exclude backend/ml_client/src

  # ════════════════════════════════════════════════════════════
  # Deploy — only when merged to main
  # ════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AWS
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_QA }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/app-mockup/package-lock.json

      # Backend + ML: CDK deploy rebuilds Docker images + updates services
      - name: Deploy backend + ML (CDK)
        working-directory: infra/aws/cdk
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk
          cdk deploy helpyy-ml-dev helpyy-compute-dev --require-approval never

      # Frontend: build + S3 + CloudFront
      - name: Build React app
        working-directory: frontend/app-mockup
        run: |
          npm ci
          npm run build

      - name: Deploy frontends to S3
        run: |
          aws s3 sync frontend/app-mockup/dist/ s3://helpyy-dev-app-${{ secrets.AWS_ACCOUNT_ID }}/ --delete
          aws s3 sync frontend/web-widget/ s3://helpyy-dev-widget-${{ secrets.AWS_ACCOUNT_ID }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_APP_DIST_ID }} --paths "/*"
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_WIDGET_DIST_ID }} --paths "/*"
