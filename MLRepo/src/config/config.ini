
[DATA]
input_path = data/generated/model_mt.csv
target_column = default
id_column = client_id

[TRAINING]
training_mode = selected
test_size = 0.2
random_state = 42
max_iter = 1000
solver = liblinear
class_weight = balanced

[PREPROCESSING]
scale_numeric = true
scale_datetime = true

[FEATURES]
top_k_features = 5
exclude_columns = p_default, national_id
exclude_prefixes = target__
selected_training_features =
    declared_income,
    is_banked,
    employment_type,
    age,
    city_type,
    total_sessions,
    pct_conversion,
    tx_income_pct,
    payments_count,
    on_time_rate,
    overdue_rate,
    avg_decision_score

    
[OUTPUT]
models_dir = models
model_name = logistic_regression
export_design_matrix = false
